name: aicam_coach
description: "智眸AI相机 - 智能摄影指导应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 相机
  camerawesome: ^2.1.0

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 网络请求
  dio: ^5.8.0+1
  cached_network_image: ^3.3.1

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 图像处理
  image: ^4.5.4
  image_picker: ^1.1.2

  # 工具
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  uuid: ^4.5.1

  # AI/ML - 端侧姿态检测
  google_mlkit_pose_detection: ^0.14.0
  google_mlkit_commons: ^0.11.0

  # 语音
  flutter_tts: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/templates/
    - assets/icons/
